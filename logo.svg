<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0a0a"/>
      <stop offset="100%" style="stop-color:#1a1a2e"/>
    </linearGradient>
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f5c518"/>
      <stop offset="50%" style="stop-color:#e0a800"/>
      <stop offset="100%" style="stop-color:#c49000"/>
    </linearGradient>
    <linearGradient id="goldShine" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ffe066"/>
      <stop offset="100%" style="stop-color:#e0a800"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="shadow">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#f5c518" flood-opacity="0.3"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" rx="64" fill="url(#bg)"/>

  <!-- Outer border accent -->
  <rect x="8" y="8" width="496" height="496" rx="58" fill="none" stroke="url(#gold)" stroke-width="3" opacity="0.4"/>

  <!-- Crown -->
  <g filter="shadow">
    <polygon points="175,155 195,100 225,135 256,85 287,135 317,100 337,155" fill="url(#goldShine)" stroke="url(#gold)" stroke-width="2"/>
    <!-- Crown jewels -->
    <circle cx="195" cy="115" r="6" fill="#e74c3c"/>
    <circle cx="256" cy="95" r="8" fill="#e74c3c"/>
    <circle cx="317" cy="115" r="6" fill="#e74c3c"/>
    <!-- Crown base -->
    <rect x="175" y="148" width="162" height="18" rx="3" fill="url(#gold)"/>
  </g>

  <!-- Sunglasses -->
  <g filter="glow">
    <!-- Bridge -->
    <path d="M235,220 Q256,212 277,220" fill="none" stroke="url(#gold)" stroke-width="5" stroke-linecap="round"/>
    <!-- Left lens -->
    <rect x="168" y="208" width="67" height="40" rx="8" fill="#111" stroke="url(#gold)" stroke-width="3.5"/>
    <!-- Right lens -->
    <rect x="277" y="208" width="67" height="40" rx="8" fill="#111" stroke="url(#gold)" stroke-width="3.5"/>
    <!-- Left arm -->
    <line x1="168" y1="222" x2="145" y2="218" stroke="url(#gold)" stroke-width="3.5" stroke-linecap="round"/>
    <!-- Right arm -->
    <line x1="344" y1="222" x2="367" y2="218" stroke="url(#gold)" stroke-width="3.5" stroke-linecap="round"/>
    <!-- Lens shine -->
    <line x1="185" y1="215" x2="195" y2="215" stroke="#f5c518" stroke-width="1.5" opacity="0.5" stroke-linecap="round"/>
    <line x1="295" y1="215" x2="305" y2="215" stroke="#f5c518" stroke-width="1.5" opacity="0.5" stroke-linecap="round"/>
  </g>

  <!-- TOPG text -->
  <text x="256" y="340" text-anchor="middle" font-family="Arial Black, Impact, sans-serif" font-weight="900" font-size="108" letter-spacing="8" fill="url(#gold)" filter="shadow">TOPG</text>

  <!-- Subtitle -->
  <text x="256" y="385" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-weight="700" font-size="22" letter-spacing="12" fill="#f5c518" opacity="0.7">ESCAPE THE MATRIX</text>

  <!-- VS battle line -->
  <g opacity="0.9">
    <line x1="100" y1="420" x2="220" y2="420" stroke="url(#gold)" stroke-width="2"/>
    <text x="256" y="428" text-anchor="middle" font-family="Arial Black, sans-serif" font-weight="900" font-size="20" fill="#e74c3c">VS</text>
    <line x1="292" y1="420" x2="412" y2="420" stroke="url(#gold)" stroke-width="2"/>
  </g>

  <!-- Agent names -->
  <text x="160" y="458" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-weight="700" font-size="20" fill="#ffffff" opacity="0.9">CLAUDE</text>
  <text x="352" y="458" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-weight="700" font-size="20" fill="#ffffff" opacity="0.9">CODEX</text>
</svg>
